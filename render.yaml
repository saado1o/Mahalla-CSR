services:
  # Backend API Service (Django + Daphne for WebSockets)
  - type: web
    name: mahallahub-api
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT server.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mahallahub-db
          property: connectionString
      - key: REDIS_URL
        value: rediss://red-d6fun63uibrs739c173g:bnnCj937Mb5ho72yRMyhwnBKM0z5pygb@oregon-keyvalue.render.com:6379
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: ALLOWED_HOSTS
        value: ".onrender.com,www.sbf-consultancy.net,mahalla-three.vercel.app"

# Database (PostgreSQL)
databases:
  - name: mahallahub-db
    plan: free
