services:
  # Backend API Service (Django + Daphne for WebSockets)
  - type: web
    name: mahallahub-api
    env: docker
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mahallahub-db
          property: connectionString
      - key: REDIS_URL
        value: "rediss://<USER>:<PASSWORD>@<HOST>:6379"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: ALLOWED_HOSTS
        value: ".onrender.com,<YOUR_DOMAIN>"

# Database (PostgreSQL)
databases:
  - name: mahallahub-db
    plan: free
